# Per spec §7.5: ruff, mypy (changed files only), trailing-whitespace,
# large-file check, detect-secrets, nbstripout with exemptions.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ["--maxkb=8192"]
      - id: check-merge-conflict

  # Local ruff hooks (not ruff-pre-commit) so the hook and CI ruff run in
  # the same uv-synced env. Avoids "passes locally, fails in CI" drift
  # when ruff version moves.
  - repo: local
    hooks:
      - id: ruff
        name: ruff
        entry: uv run ruff check --fix
        language: system
        types: [python]
        pass_filenames: true
      - id: ruff-format
        name: ruff-format
        entry: uv run ruff format
        language: system
        types: [python]
        pass_filenames: true

  # Local mypy hook (not mirrors-mypy) so the hook and CI mypy run in the
  # same uv-synced env. Avoids "green locally, red in CI" drift when fmf/
  # gains new deps (pandas in S1, lightgbm in S6, etc.).
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run mypy
        language: system
        types: [python]
        files: ^fmf/
        pass_filenames: false
        args: ["fmf/"]

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]

  - repo: https://github.com/kynan/nbstripout
    rev: 0.7.1
    hooks:
      - id: nbstripout
        # Spec §7.5: exempt notebooks/eda/* and the two flagship notebooks
        exclude: |
          (?x)^(
            notebooks/eda/.* |
            notebooks/dead_cv_bug\.ipynb |
            notebooks/cv_leakage_falsification\.ipynb
          )$
